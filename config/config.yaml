# Autonomous Ad Engine Configuration

models:
  generator: "gemini-3.1-flash-lite-preview"
  evaluator: "gemini-3.1-flash-lite-preview"
  escalation: "gemini-2.5-flash"

quality:
  threshold: 7.25
  max_regeneration_attempts: 3

dimensions:
  clarity:
    weight: 0.25
    description: "Is the message immediately understandable in under 3 seconds?"
    score_1: "Confusing, multiple messages competing for attention"
    score_10: "Crystal clear single takeaway"
  value_proposition:
    weight: 0.25
    description: "Does it communicate a compelling, specific benefit?"
    score_1: "Generic, feature-focused (e.g., 'we have tutors')"
    score_10: "Specific, differentiated benefit (e.g., 'raise your SAT score 200+ points')"
  call_to_action:
    weight: 0.20
    description: "Is the next step clear, compelling, and low-friction?"
    score_1: "No CTA or vague ('learn more')"
    score_10: "Specific, urgent, low-friction ('Start your free practice test')"
  brand_voice:
    weight: 0.15
    description: "Does it sound like Varsity Tutors?"
    score_1: "Generic, could be any brand"
    score_10: "Distinctly empowering, knowledgeable, approachable"
  emotional_resonance:
    weight: 0.15
    description: "Does it connect with real emotional motivation?"
    score_1: "Flat, purely rational"
    score_10: "Taps into parent worry, student ambition, or test anxiety"

brand:
  name: "Varsity Tutors"
  parent_company: "Nerdy"
  voice: "Empowering, knowledgeable, approachable, results-focused"
  guidelines:
    - "Lead with outcomes, not features"
    - "Confident but not arrogant"
    - "Expert but not elitist"
    - "Meet people where they are"
  audience_segments:
    - id: "athlete_family"
      label: "Mother of a recruited student-athlete whose SAT is the gating factor for scholarships/eligibility"
    - id: "suburban_optimizer"
      label: "Upper-middle-class suburban parent whose child has a 3.8+ GPA but mid-1200s SAT"
    - id: "immigrant_navigator"
      label: "First/second-gen immigrant family navigating the US college admissions system"
    - id: "cultural_investor"
      label: "Dual-income STEM household already investing in multiple prep resources without results"
    - id: "system_optimizer"
      label: "Corporate father who treats SAT tutoring as a procurement decision"
    - id: "neurodivergent_advocate"
      label: "Mother of a student with ADHD/dyslexia/processing differences who needs the right tutor fit"
    - id: "burned_returner"
      label: "Parent returning after a negative prior tutoring experience"
    - id: "stressed_students"
      label: "High school students stressed about SAT scores, often dealing with test anxiety or score plateaus"
    - id: "comparison_shoppers"
      label: "Families comparing SAT prep options who have tried or are evaluating self-study, group classes, or local tutors"

seed: 42

# ── v2: Image Generation ──────────────────────────────────────────────

image_generation:
  model: "gemini-3.1-flash-image-preview"     # Nano Banana 2 (default)
  # Alt: "gemini-3-pro-image-preview"         # Nano Banana Pro — 2x cost, better text rendering
  default_aspect_ratio: "1:1"                  # feed ads; "9:16" for Stories
  default_resolution: "1K"                     # 512 for drafts, 1K for production, 2K/4K for high-res
  thinking_level: "minimal"                    # "minimal" (faster/cheaper) or "high" (better quality)
  variants_per_ad: 4                           # image variants per text ad (8 styles available)
  text_overlay_mode: "programmatic"            # "programmatic" (PIL, pixel-perfect) or "ai" (in-image, experimental)
  style_approaches:
    - "photorealistic"
    - "ugc_style"
    - "illustration"
    - "minimal_graphic"
    - "hero_photo"
    - "infographic"
    - "typography_checklist"
    - "comic_panel"

visual_evaluation:
  model: "gemini-2.5-flash"                    # multimodal judge (see orchestration rationale)
  threshold: 6.5                               # lower than text — image eval is noisier
  dimensions:
    brand_consistency:
      weight: 0.30
      description: "Does the image match Varsity Tutors' visual identity?"
      score_1: "Generic stock photo, could be any brand"
      score_10: "Distinctly VT: warm, approachable, education-focused, trustworthy"
    engagement_potential:
      weight: 0.30
      description: "Would this stop a thumb-scroll in a Facebook/Instagram feed?"
      score_1: "Boring, forgettable, blends into the feed"
      score_10: "Arresting visual that demands attention without being clickbait"
    text_image_coherence:
      weight: 0.25
      description: "Does the image reinforce and complement the ad copy?"
      score_1: "Disconnected — image has nothing to do with the copy"
      score_10: "Image and copy tell one unified story"
    technical_quality:
      weight: 0.15
      description: "Resolution, composition, no AI artifacts?"
      score_1: "Distorted faces, melted text, blurry, bad composition"
      score_10: "Clean, high-resolution, professional composition"
