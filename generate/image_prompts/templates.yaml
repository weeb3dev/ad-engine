# Image generation prompt templates for Nano Banana 2
# Assembled by generate/image_prompts/prompt_builder.py into a single paragraph per image call.
# Aspect ratio is enforced via types.ImageConfig, NOT through prompt text.

base_instructions: |
  This is a creative for a Facebook/Instagram paid social ad for Varsity Tutors SAT prep.
  High quality, well-lit, professional but warm and approachable.
  Brand tone: Varsity Tutors — warm blues and whites, education-focused, trustworthy.
  No watermarks, logos, or UI chrome in the image.
  Do NOT include the Facebook ad interface or phone mockup — just the creative.

audience_scenes:
  athlete_family: >-
    A student-athlete at home after practice — sports bag nearby, laptop open for SAT tutoring.
    Athletic energy meets academic focus. Warm lighting, modern suburban home.
  suburban_optimizer: >-
    A warm, well-lit family home. A supportive parent and their teenager
    at a kitchen table or cozy home office with study materials. Modern decor, natural light.
  immigrant_navigator: >-
    A welcoming, warm family setting. A parent and teenager looking at a laptop together,
    modern diverse household. Supportive atmosphere, study materials visible.
  cultural_investor: >-
    An organized study space with multiple prep materials visible — books, tablet, laptop.
    A focused teenager ready to consolidate their approach. Clean, modern, purposeful.
  system_optimizer: >-
    A clean, data-focused setting. Dashboard-like visual. Minimal, professional environment.
    No lifestyle imagery — data and results only. White/light background, clean typography feel.
  neurodivergent_advocate: >-
    A comfortable, low-stimulation study space designed for focus. A teenager with a laptop
    in a calm environment. Warm but not cluttered. Supportive, personalized feel.
  burned_returner: >-
    A fresh-start setting. A parent and teenager looking hopeful at a laptop screen showing
    progress. Clean, trustworthy environment. Second-chance energy.
  stressed_students: >-
    A bright, organized study space. A focused teenager with a laptop,
    determined but not stressed. Study materials visible. Natural window light.
  comparison_shoppers: >-
    A clean, aspirational setting. A confident student or parent-student
    pair in a modern environment that communicates 'smart choice.' Achievement-oriented.

style_modifiers:
  photorealistic: >-
    Professional photography style. Shallow depth of field, natural warm
    lighting, real people with genuine expressions. DSLR quality, 85mm lens feel. Authentic,
    not posed stock photography.
  ugc_style: >-
    Casual smartphone photo aesthetic. Slightly imperfect framing, warm ambient
    light, real-life feel. Like a parent or student took this photo naturally. No studio setup.
    Do NOT include any text, captions, watermarks, or overlays in the image — it must look like a raw, unedited photo.
  illustration: >-
    Modern flat illustration. Clean geometric shapes, warm color palette
    (blues, warm whites, soft oranges), friendly simplified characters. Think Headspace or
    Duolingo ad visual language.
  minimal_graphic: >-
    Bold graphic design. Large sans-serif typography as the focal point,
    solid or soft gradient background in warm blue tones, minimal imagery. Clean and modern.
    Think Apple or Nike simplicity applied to education.
  hero_photo: >-
    Polished lifestyle photography with structured ad composition. Warm natural lighting,
    real student or parent-student subject at a desk or kitchen table with study materials.
    Leave the top third of the image as a clean, bright area (white or very light) for headline
    text to be overlaid. The subject should occupy the lower two-thirds. Shallow depth of field,
    modern home environment, approachable and aspirational. A smartphone showing a calendar or
    study app may appear as a secondary visual element. Professional but not sterile.
  infographic: >-
    Clean graphic design with informational visual elements. Use a light gray or off-white
    background with a calendar grid, timeline, or schedule layout as the main visual structure.
    Include a prominent purple (#8B6BAE) sticky note or card element overlaid on the calendar
    with white bold text showing a key stat or number. Use a pink (#E94E8C) circle or highlight
    to accent an important date. Dark navy (#1B2A4A) bold sans-serif headline text at the top.
    No photography, no people — purely designed graphic elements. Clean, data-forward, modern.
    Include the text '{headline}' as the main headline rendered in dark navy at the top of the image.
  typography_checklist: >-
    Pure typography-forward design on a light lavender/lilac (#EDE5F4) background with a subtle
    curved wave or organic shape element. The entire creative is bold dark navy (#1B2A4A)
    sans-serif text arranged in a stepped checklist or stacked statement format — each line is
    a short punchy phrase. After each line, include a small colored checkmark accent in rotating
    colors: teal (#4BC8C1), purple (#8B6BAE), pink (#E94E8C), yellow (#F5C842). Minimal
    decoration — the text IS the design. Small "Varsity Tutors" branding text at the bottom.
    Include the text '{headline}' formatted as the checklist content.
  comic_panel: >-
    Comic book editorial illustration style. Split the image into two side-by-side vertical
    panels with bold blue (#2B5EA7) borders. Left panel shows a confident, happy cartoon student
    (clean modern illustration, not clip art) in a bright setting. Right panel shows the same or
    similar student looking confused or stressed with a large question mark. Use comic book
    visual conventions: halftone dot textures, thought bubbles, slight paper texture. Bold dark
    text overlaid across the center spanning both panels as a punchy question or statement.
    Bright, saturated colors. Relatable "before and after" or contrast narrative.
    Include the text '{headline}' as the bold center overlay text.

placement_instructions:
  feed_square: >-
    Compose for a square Facebook/Instagram feed placement. Center the focal point.
  feed_landscape: >-
    Compose for a wide landscape Facebook feed placement. Use horizontal visual flow.
  stories_vertical: >-
    Compose for a vertical Instagram Stories placement. Stack elements top-to-bottom.

campaign_goal_modifiers:
  awareness: >-
    Emotional and aspirational. Focus on possibility, relief, and connection.
  conversion: >-
    Action-oriented. Clear visual hierarchy, emphasis on the offer.

# Only used when text_overlay_mode == "ai" in config
headline_instruction_ai: >-
  Include the text '{headline}' as visible overlay text in the image,
  using a clean, readable sans-serif font in white or dark blue with sufficient contrast
  against the background.

# Used when text_overlay_mode == "programmatic" (default) — headline added via PIL after generation
headline_instruction_programmatic: >-
  Leave clear space at the bottom of the image for a text overlay that will be added
  separately. Do NOT render any text in the image.
